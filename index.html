<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şarjlan Stok</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#ff7300">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>

<body>

<header>

<div class="logo">

⚡ ŞARJLAN

</div>

<div class="headerButtons">

<button onclick="backupData()">

💾

</button>

<button onclick="restoreData()">

📂

</button>

</div>

</header>

<section class="dashboard">

<div class="dashCard">

<h4>Toplam Ürün</h4>

<h2 id="toplamUrun">

0

</h2>

</div>

<div class="dashCard">

<h4>Toplam Stok</h4>

<h2 id="toplamStok">

0

</h2>

</div>

<div class="dashCard">

<h4>Bugünkü Satış</h4>

<h2 id="bugun">

0

</h2>

</div>

<div class="dashCard">

<h4>Düşük Stok</h4>

<h2 id="dusuk">

0

</h2>

</div>

</section>

<section class="searchArea">

<input
id="arama"
placeholder="Ürün ara..."
type="text">

</section>

<section id="urunListesi">

</section>

<div class="floating">

<button onclick="yeniUrun()">

+

</button>

</div>

<nav>

<button onclick="menuSec(0)">

🏠

<div>Anasayfa</div>

</button>

<button onclick="menuSec(1)">

📦

<div>Ürünler</div>

</button>

<button onclick="menuSec(2)">

🛒

<div>Satış</div>

</button>

<button onclick="menuSec(3)">

👤

<div>Müşteriler</div>

</button>

<button onclick="menuSec(4)">

⚙️

<div>Ayarlar</div>

</button>

</nav>

<div class="modal" id="urunModal">

<div class="modalContent">

<span
class="close"
onclick="modalKapat()">

×

</span>

<h2 id="urunAdi">

</h2>

<p>

Mevcut Stok

</p>

<h1 id="urunStok">

0

</h1>

<div class="modalButtons">

<button
class="green"
onclick="stokEkle()">

➕

Stoğa Ekle

</button>

<button
class="red"
onclick="satisModalAc()">

🛒

Satış Yap

</button>

</div>

<h3>

Hareketler

</h3>

<ul id="hareketListesi">

</ul>

</div>

</div>

<div
class="modal"
id="satisModal">

<div class="modalContent">

<span
class="close"
onclick="satisModalKapat()">

×

</span>

<h2>

Satış

</h2>

<input
id="musteri"
placeholder="Müşteri Adı">

<input
id="telefon"
placeholder="Telefon">

<input
id="adres"
placeholder="Adres">

<input
id="adet"
type="number"
value="1">

<input
id="fiyat"
type="number"
placeholder="Satış Fiyatı">

<select id="odeme">

<option>Nakit</option>

<option>Kart</option>

<option>Havale</option>

</select>

<button
class="saveButton"
onclick="satisKaydet()">

SATIŞI TAMAMLA

</button>

</div>

</div>

<input
type="file"
id="restoreFile"
hidden>

<script src="app.js"></script>

</body>
</html>
